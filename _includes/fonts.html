<!-- Preset Typography — Fluid Theme
     Fonts are loaded on demand based on the active preset.
     Switching presets triggers dynamic font loading via MutationObserver.

     Preset → Font Pairing:
       still     → system-ui (intentionally minimal — Swiss design needs no ornament)
       serene    → Cormorant Garamond + EB Garamond (contemplative, literary)
       stream    → Plus Jakarta Sans (modern SaaS, clean, professional)
       trickling → system-ui (utility-first, developer-friendly)
       flowing   → Outfit + DM Sans (Fluid brand identity — smooth, geometric)
       cascade   → Nunito (friendly, rounded, approachable)
       rapids    → Syne + Space Grotesk (athletic, punchy, high-energy)
       tsunami   → Bebas Neue + Barlow (cinematic, dramatic, Hokusai)
       brutalist → Space Mono (geometric, industrial, raw)
       editorial → Playfair Display + Libre Baskerville (luxury magazine)
       neon      → Orbitron + Exo 2 (cyberpunk, futuristic)
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style id="theme-fonts">
  /* ========================================
     FONT FAMILY TOKENS — Per Preset
     These set the CSS variables. Actual font files
     are loaded dynamically by the script below.
     ======================================== */

  /* Default (flowing): Outfit + DM Sans — the Fluid brand voice */
  :root {
    --font-heading: 'Outfit', var(--font-system);
    --font-body: 'DM Sans', var(--font-system);
    --font-display: 'Outfit', var(--font-system);
  }

  /* STILL: System-native — Swiss design needs no custom typeface */
  [data-motion="still"] {
    --font-heading: var(--font-system);
    --font-body: var(--font-system);
    --font-display: var(--font-system);
  }

  /* SERENE: Contemplative, literary, spa-like */
  [data-motion="serene"] {
    --font-heading: 'Cormorant Garamond', var(--font-serif);
    --font-body: 'EB Garamond', var(--font-serif);
    --font-display: 'Cormorant Garamond', var(--font-serif);
  }

  /* STREAM: Modern SaaS, clean, approachable */
  [data-motion="stream"] {
    --font-heading: 'Plus Jakarta Sans', var(--font-system);
    --font-body: 'Plus Jakarta Sans', var(--font-system);
    --font-display: 'Plus Jakarta Sans', var(--font-system);
  }

  /* TRICKLING: Utility-first, developer-friendly */
  [data-motion="trickling"] {
    --font-heading: var(--font-system);
    --font-body: var(--font-system);
    --font-display: var(--font-system);
  }

  /* FLOWING: Fluid brand identity — smooth, geometric, modern */
  :root:not([data-motion]),
  [data-motion="flowing"] {
    --font-heading: 'Outfit', var(--font-system);
    --font-body: 'DM Sans', var(--font-system);
    --font-display: 'Outfit', var(--font-system);
  }

  /* CASCADE: Friendly, rounded, Notion/Slack vibes */
  [data-motion="cascade"] {
    --font-heading: 'Nunito', var(--font-system);
    --font-body: 'Nunito', var(--font-system);
    --font-display: 'Nunito', var(--font-system);
  }

  /* RAPIDS: Athletic, punchy, high-energy */
  [data-motion="rapids"] {
    --font-heading: 'Syne', var(--font-system);
    --font-body: 'Space Grotesk', var(--font-system);
    --font-display: 'Syne', var(--font-system);
  }

  /* TSUNAMI: Cinematic, dramatic, Hokusai-inspired */
  [data-motion="tsunami"] {
    --font-heading: 'Bebas Neue', var(--font-system);
    --font-body: 'Barlow', var(--font-system);
    --font-display: 'Bebas Neue', var(--font-system);
  }

  /* BRUTALIST: Geometric, industrial, uncompromising */
  [data-motion="brutalist"] {
    --font-heading: 'Space Mono', var(--font-mono);
    --font-body: 'Space Mono', var(--font-mono);
    --font-display: 'Space Mono', var(--font-mono);
    --font-ui: 'Space Mono', var(--font-mono);
  }

  /* EDITORIAL: Luxury magazine, contemplative */
  [data-motion="editorial"] {
    --font-heading: 'Playfair Display', var(--font-serif);
    --font-body: 'Libre Baskerville', var(--font-serif);
    --font-display: 'Playfair Display', var(--font-serif);
  }

  /* NEON: Cyberpunk, futuristic, electric */
  [data-motion="neon"] {
    --font-heading: 'Orbitron', var(--font-system);
    --font-body: 'Exo 2', var(--font-system);
    --font-display: 'Orbitron', var(--font-system);
    --font-ui: 'Exo 2', var(--font-system);
  }
</style>

<script>
  (function() {
    // Map each preset to its Google Fonts URL
    const PRESET_FONTS = {
      still:     null,  // System fonts — no load needed
      trickling: null,  // System fonts — no load needed
      serene:    'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap',
      stream:    'https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap',
      flowing:   'https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap',
      cascade:   'https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap',
      rapids:    'https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap',
      tsunami:   'https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap',
      brutalist: 'https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap',
      editorial: 'https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap',
      neon:      'https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap'
    };

    const loaded = new Set();

    function loadPresetFont(preset) {
      const url = PRESET_FONTS[preset];
      if (!url || loaded.has(preset)) return;
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = url;
      document.head.appendChild(link);
      loaded.add(preset);
    }

    // Load font for the initial preset
    const initial = document.documentElement.getAttribute('data-motion') || 'flowing';
    loadPresetFont(initial);

    // Observe preset changes and load fonts on demand
    new MutationObserver(function(mutations) {
      mutations.forEach(function(m) {
        if (m.attributeName === 'data-motion') {
          const next = document.documentElement.getAttribute('data-motion') || 'flowing';
          loadPresetFont(next);
        }
      });
    }).observe(document.documentElement, { attributes: true, attributeFilter: ['data-motion'] });
  })();
</script>
