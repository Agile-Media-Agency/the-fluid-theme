name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Component (new)
        - Component (enhancement)
        - Layout
        - Palette / Colors
        - Motion / Animation
        - Typography
        - Tokens
        - Preset
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why do you need this? What problem does it solve?
    validations:
      required: true

  - type: dropdown
    id: willing-to-pr
    attributes:
      label: Would you be willing to submit a PR?
      options:
        - "Yes"
        - "Maybe, with guidance"
        - "No"
    validations:
      required: false
