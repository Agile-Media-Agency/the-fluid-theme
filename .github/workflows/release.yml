name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '_config.yml'
      - 'package.json'
      - 'src/fluid.css'
      - 'CHANGELOG.md'

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip if commit is from the bot itself
    if: "!contains(github.event.head_commit.message, 'chore: release')"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump type
        id: bump-type
        run: |
          # Check merged PR labels for bump type
          # Default to patch if no label found
          BUMP="patch"

          # Get the merge commit's associated PR
          PR_NUMBER=$(git log -1 --pretty=%s | grep -oP '#\K\d+' || echo "")

          if [ -n "$PR_NUMBER" ]; then
            LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name' 2>/dev/null || echo "")
            if echo "$LABELS" | grep -q "major"; then
              BUMP="major"
            elif echo "$LABELS" | grep -q "minor"; then
              BUMP="minor"
            fi
          fi

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Version bump type: $BUMP"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get PR title for changelog
        id: pr-info
        run: |
          PR_NUMBER=$(git log -1 --pretty=%s | grep -oP '#\K\d+' || echo "")
          if [ -n "$PR_NUMBER" ]; then
            TITLE=$(gh pr view "$PR_NUMBER" --json title --jq '.title' 2>/dev/null || echo "")
          fi

          if [ -z "$TITLE" ]; then
            # Fall back to commit message
            TITLE=$(git log -1 --pretty=%s | sed 's/ (#[0-9]*)$//')
          fi

          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "Changelog entry: $TITLE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: version
        run: |
          BUMP="${{ steps.bump-type.outputs.bump }}"
          CURRENT=$(grep 'version:' _config.yml | sed 's/version: "//;s/"//')
          echo "Current version: $CURRENT"

          IFS='.' read -ra PARTS <<< "$CURRENT"
          MAJOR=${PARTS[0]}
          MINOR=${PARTS[1]}
          PATCH=${PARTS[2]}

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous=$CURRENT" >> "$GITHUB_OUTPUT"

          # Update version in all files
          sed -i "s/version: \"$CURRENT\"/version: \"$NEW_VERSION\"/" _config.yml
          sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/" package.json
          sed -i "s/@version .*/@version $NEW_VERSION/" src/fluid.css

      - name: Update changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREVIOUS="${{ steps.version.outputs.previous }}"
          TITLE="${{ steps.pr-info.outputs.title }}"
          BUMP="${{ steps.bump-type.outputs.bump }}"
          DATE=$(date +%Y-%m-%d)

          # Determine changelog section based on bump type
          case "$BUMP" in
            major) SECTION="Changed" ;;
            minor) SECTION="Added" ;;
            patch) SECTION="Fixed" ;;
          esac

          # Create new entry
          ENTRY="## [$VERSION] - $DATE\n\n### $SECTION\n- $TITLE\n"

          # Insert after the header lines (after the "adheres to Semantic Versioning" line)
          sed -i "/^and this project adheres/a\\\\n$ENTRY" CHANGELOG.md

          # Add comparison link
          LINK="[$VERSION]: https://github.com/Agile-Media-Agency/the-fluid-theme/compare/v$PREVIOUS...v$VERSION"
          echo "$LINK" >> CHANGELOG.md

      - name: Commit, tag, and push
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _config.yml package.json src/fluid.css CHANGELOG.md
          git commit -m "chore: release v$VERSION"
          git tag "v$VERSION"
          git push
          git push --tags

      - name: Create GitHub Release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TITLE="${{ steps.pr-info.outputs.title }}"
          BUMP="${{ steps.bump-type.outputs.bump }}"

          case "$BUMP" in
            major) SECTION="Changed" ;;
            minor) SECTION="Added" ;;
            patch) SECTION="Fixed" ;;
          esac

          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "### $SECTION
          - $TITLE

          **Full Changelog**: https://github.com/Agile-Media-Agency/the-fluid-theme/compare/v${{ steps.version.outputs.previous }}...v$VERSION

          ### Install
          \`\`\`bash
          npm install the-fluid-theme@$VERSION
          \`\`\`

          ### CDN
          \`\`\`html
          <link rel=\"stylesheet\" href=\"https://cdn.jsdelivr.net/npm/the-fluid-theme@$VERSION/src/fluid.css\">
          \`\`\`"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
