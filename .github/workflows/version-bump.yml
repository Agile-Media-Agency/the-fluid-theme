name: Auto Version Bump

# Only bump version when merging to main (not on every push)
on:
  push:
    branches:
      - main
    paths-ignore:
      - '_config.yml'  # Prevent infinite loop

jobs:
  bump-version:
    runs-on: ubuntu-latest
    # Skip if commit is from the bot itself
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        run: |
          # Get current version
          CURRENT=$(grep 'version:' _config.yml | sed 's/version: "//;s/"//')
          echo "Current version: $CURRENT"

          # Split and increment
          IFS='.' read -ra PARTS <<< "$CURRENT"
          MAJOR=${PARTS[0]}
          MINOR=${PARTS[1]}
          PATCH=${PARTS[2]}
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo "New version: $NEW_VERSION"

          # Update file
          sed -i "s/version: \"$CURRENT\"/version: \"$NEW_VERSION\"/" _config.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _config.yml
          git commit -m "chore: bump version to $(grep 'version:' _config.yml | sed 's/version: "//;s/"//')"
          git push
