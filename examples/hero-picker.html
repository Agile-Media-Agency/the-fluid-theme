---
title: Hero Picker
description: Fluid Framework - Interactive Hero Builder
nav: hero-picker
---
<style>
  @layer demo {
    .picker-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-6);
      padding: var(--space-5);
    }

    @media (min-width: 64rem) {
      .picker-layout {
        grid-template-columns: 320px 1fr;
        min-block-size: calc(100vh - 60px);
      }
    }

    /* Controls Panel */
    .picker-controls {
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      padding: var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
      block-size: fit-content;
      position: sticky;
      inset-block-start: 80px;
    }

    .picker-controls h2 {
      font-size: var(--font-size-lg);
      margin: 0;
      padding-block-end: var(--space-3);
      border-block-end: 1px solid var(--color-border-subtle);
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .control-group label {
      font-size: var(--font-size-sm);
      font-weight: var(--weight-medium);
      color: var(--color-text-muted);
    }

    .control-group select,
    .control-group input[type="text"] {
      padding: var(--space-2) var(--space-3);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-background);
      font-size: var(--font-size-sm);
    }

    .control-group input[type="text"] {
      inline-size: 100%;
    }

    /* Toggle Switch inline */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
    }

    .toggle-row label {
      font-size: var(--font-size-sm);
      font-weight: var(--weight-medium);
      color: var(--color-text-muted);
    }

    /* Preview Area */
    .picker-preview {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
    }

    .preview-header h2 {
      font-size: var(--font-size-lg);
      margin: 0;
    }

    .preview-container {
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-xl);
      overflow: hidden;
      min-block-size: 400px;
      position: relative;
    }

    /* Preview transition wrapper */
    .preview-container .hero {
      view-transition-name: hero-preview;
    }

    /*
     * Preview uses crossfade for all motion levels.
     * Full directional animations are for page navigation.
     * Same-page updates look better with simpler crossfade.
     */

    /* Base: gentle crossfade */
    ::view-transition-old(hero-preview) {
      animation: var(--duration-normal, 350ms) var(--ease-fluid, ease) both fade-out;
    }
    ::view-transition-new(hero-preview) {
      animation: var(--duration-normal, 350ms) var(--ease-fluid, ease) both fade-in;
    }

    /* Still: instant */
    [data-motion="still"] ::view-transition-old(hero-preview),
    [data-motion="still"] ::view-transition-new(hero-preview) {
      animation: none;
    }

    /* Serene: slow crossfade with subtle zoom */
    [data-motion="serene"] ::view-transition-old(hero-preview) {
      animation: var(--duration-slow) var(--ease-fluid) both kenburns-out;
    }
    [data-motion="serene"] ::view-transition-new(hero-preview) {
      animation: var(--duration-slow) var(--ease-fluid) both kenburns-in;
    }

    /* Code Output */
    .code-output {
      background: var(--gray-10);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      overflow-x: auto;
    }

    .code-output pre {
      margin: 0;
      font-family: var(--font-mono);
      font-size: var(--font-size-sm);
      color: var(--gray-80);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-block-end: var(--space-4);
    }

    .code-header h3 {
      font-size: var(--font-size-base);
      margin: 0;
    }

    /* Button styles for copy */
    .btn-copy {
      padding: var(--space-2) var(--space-3);
      font-size: var(--font-size-sm);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-fluid);
    }

    .btn-copy:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .btn-copy[data-copied] {
      background: var(--color-success);
      border-color: var(--color-success);
      color: white;
    }

    /* Preset buttons */
    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .preset-btn {
      padding: var(--space-1) var(--space-2);
      font-size: var(--font-size-xs);
      background: var(--color-background);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-fluid);
    }

    .preset-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .preset-btn[data-active] {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* Mobile improvements */
    @media (max-width: 63.99rem) {
      .picker-controls {
        position: relative;
        inset-block-start: 0;
      }

      .picker-layout {
        padding: var(--space-4);
        gap: var(--space-5);
      }

      .preview-container {
        min-block-size: 300px;
      }
    }

    /* Collapsed sections for mobile */
    @media (max-width: 40rem) {
      .picker-controls {
        padding: var(--space-4);
        gap: var(--space-4);
      }

      .control-group select,
      .control-group input[type="text"] {
        padding: var(--space-3);
      }
    }
  }
</style>

<div class="picker-layout">
  <!-- Controls Panel -->
  <aside class="picker-controls">
    <h2>Hero Builder</h2>

    <!-- Presets -->
    <div class="control-group">
      <label>Quick Presets</label>
      <div class="presets">
        <button class="preset-btn" onclick="applyPreset('minimal')">Minimal</button>
        <button class="preset-btn" onclick="applyPreset('bold')">Bold Dark</button>
        <button class="preset-btn" onclick="applyPreset('split')">Split Media</button>
        <button class="preset-btn" onclick="applyPreset('cinematic')">Cinematic</button>
        <button class="preset-btn" onclick="applyPreset('gradient')">Gradient</button>
        <button class="preset-btn" onclick="applyPreset('landing')">Landing Page</button>
      </div>
    </div>

    <!-- Layout -->
    <div class="control-group">
      <label for="layout">Layout</label>
      <select id="layout" onchange="updatePreview()">
        <option value="center">Center</option>
        <option value="left">Left</option>
        <option value="right">Right</option>
        <option value="split">Split (Media Right)</option>
        <option value="split-reverse">Split Reverse (Media Left)</option>
      </select>
    </div>

    <!-- Theme -->
    <div class="control-group">
      <label for="theme">Theme</label>
      <select id="theme" onchange="updatePreview()">
        <option value="subtle">Subtle (Light)</option>
        <option value="dark">Dark</option>
        <option value="accent">Accent Color</option>
        <option value="gradient">Gradient</option>
        <option value="primary">Primary</option>
      </select>
    </div>

    <!-- Size -->
    <div class="control-group">
      <label for="size">Size</label>
      <select id="size" onchange="updatePreview()">
        <option value="">Default (60vh)</option>
        <option value="compact">Compact (40vh)</option>
        <option value="full">Full Screen (100vh)</option>
        <option value="auto">Auto (content height)</option>
      </select>
    </div>

    <!-- Padding -->
    <div class="control-group">
      <label for="padding">Padding</label>
      <select id="padding" onchange="updatePreview()">
        <option value="md">Medium</option>
        <option value="lg">Large</option>
        <option value="xl" selected>Extra Large</option>
      </select>
    </div>

    <!-- Vertical Alignment -->
    <div class="control-group">
      <label for="valign">Vertical Alignment</label>
      <select id="valign" onchange="updatePreview()">
        <option value="">Center (default)</option>
        <option value="start">Top</option>
        <option value="end">Bottom</option>
      </select>
    </div>

    <!-- Content Width -->
    <div class="control-group">
      <label for="width">Content Width</label>
      <select id="width" onchange="updatePreview()">
        <option value="">Default (48rem)</option>
        <option value="narrow">Narrow (32rem)</option>
        <option value="wide">Wide (64rem)</option>
      </select>
    </div>

    <!-- Background Image Toggle -->
    <div class="toggle-row">
      <label for="bgImage">Background Image</label>
      <label class="switch">
        <input class="switch__input" type="checkbox" id="bgImage" onchange="updatePreview()">
        <span class="switch__track">
          <span class="switch__thumb"></span>
        </span>
      </label>
    </div>

    <!-- Image Selection (only when bg image is on) -->
    <div class="control-group" id="imageGroup" style="display: none;">
      <label for="bgImageChoice">Background Image</label>
      <select id="bgImageChoice" onchange="updatePreview()">
        <option value="0">Mountains</option>
        <option value="1">Lake Sunset</option>
        <option value="2">Starry Night</option>
        <option value="3">Ocean Waves</option>
        <option value="4">Forest Valley</option>
      </select>
    </div>

    <!-- Overlay (only when bg image is on) -->
    <div class="control-group" id="overlayGroup" style="display: none;">
      <label for="overlay">Overlay</label>
      <select id="overlay" onchange="updatePreview()">
        <option value="">None</option>
        <option value="light">Light (20%)</option>
        <option value="medium" selected>Medium (40%)</option>
        <option value="heavy">Heavy (60%)</option>
        <option value="gradient">Gradient (bottom fade)</option>
      </select>
    </div>

    <!-- Content -->
    <div class="control-group">
      <label for="headline">Headline</label>
      <input type="text" id="headline" value="Your Headline Here" oninput="updatePreview()">
    </div>

    <div class="control-group">
      <label for="subheadline">Subheadline</label>
      <input type="text" id="subheadline" value="A brief description that supports your main message." oninput="updatePreview()">
    </div>

    <!-- Buttons Toggle -->
    <div class="toggle-row">
      <label for="showButtons">Show Buttons</label>
      <label class="switch">
        <input class="switch__input" type="checkbox" id="showButtons" checked onchange="updatePreview()">
        <span class="switch__track">
          <span class="switch__thumb"></span>
        </span>
      </label>
    </div>
  </aside>

  <!-- Preview Area -->
  <main class="picker-preview">
    <div class="preview-header">
      <h2>Live Preview</h2>
    </div>

    <div class="preview-container" id="previewContainer">
      <!-- Hero preview renders here -->
    </div>

    <!-- Code Output -->
    <div class="code-output">
      <div class="code-header">
        <h3>Generated HTML</h3>
        <button class="btn-copy" onclick="copyCode()">Copy Code</button>
      </div>
      <pre id="codeOutput"></pre>
    </div>
  </main>
</div>

<footer class="section" data-layout="center" data-padding="md" style="background: var(--color-surface);">
  {% include version.html %}
</footer>

<script>
  // Background images - motion-matched collection (16:9 aspect ratio)
  const bgImages = [
    '../assets/images/motion/still/perfectly_still_water_mirror_surface_at_dawn_--ar_169_--sref__b93fb001-a59d-4d19-8b2f-a30fe2febac2_0.png', // Still
    '../assets/images/motion/stream/gentle_stream_flowing_through_peaceful_landscape_--ar_169_--s_95589398-67be-41e6-b574-2ba751a45278_0.png', // Stream
    '../assets/images/motion/cascade/cascading_waterfall_with_soft_mist_--ar_169_--sref_6712779360_3a72f4f6-292f-4c45-a797-4e291bd314fe_0.png', // Cascade
    '../assets/images/motion/rapids/turbulent_rapids_churning_with_energy_--ar_169_--sref_6712779_06294332-ef43-4c56-b7bd-a02d9985d66a_0.png', // Rapids
    '../assets/images/motion/tsunami/massive_wave_cresting_with_dramatic_power_--ar_169_--sref_671_3bade4e7-6492-4cc8-a7fc-87f071e89419_0.png'  // Tsunami
  ];

  const splitImages = [
    '../assets/images/motion/stream/gentle_stream_flowing_through_peaceful_landscape_--ar_169_--s_cec568ca-e842-44e8-915a-65cfb3a6229f_0.png',
    '../assets/images/motion/cascade/cascading_waterfall_with_soft_mist_--ar_169_--sref_6712779360_3a72f4f6-292f-4c45-a797-4e291bd314fe_1.png',
    '../assets/images/motion/rapids/turbulent_rapids_churning_with_energy_--ar_169_--sref_6712779_83c574a8-05d0-4522-949a-bf25ef8fd5e0_0.png'
  ];

  // Get current image based on selection
  function getCurrentBgImage() {
    const choice = document.getElementById('bgImageChoice').value;
    return bgImages[parseInt(choice)] || bgImages[0];
  }

  function getCurrentSplitImage() {
    return splitImages[0];
  }

  // Update preview with View Transitions API for smooth animations
  function updatePreview() {
    const layout = document.getElementById('layout').value;
    const theme = document.getElementById('theme').value;
    const size = document.getElementById('size').value;
    const padding = document.getElementById('padding').value;
    const valign = document.getElementById('valign').value;
    const width = document.getElementById('width').value;
    const bgImage = document.getElementById('bgImage').checked;
    const overlay = document.getElementById('overlay').value;
    const headline = document.getElementById('headline').value;
    const subheadline = document.getElementById('subheadline').value;
    const showButtons = document.getElementById('showButtons').checked;

    // Show/hide image-related controls
    document.getElementById('imageGroup').style.display = bgImage ? 'flex' : 'none';
    document.getElementById('overlayGroup').style.display = bgImage ? 'flex' : 'none';

    // Build attributes
    let attrs = [`data-layout="${layout}"`, `data-padding="${padding}"`];

    if (theme) attrs.push(`data-theme="${theme}"`);
    if (size) attrs.push(`data-size="${size}"`);
    if (valign) attrs.push(`data-valign="${valign}"`);
    if (width) attrs.push(`data-width="${width}"`);
    if (bgImage && overlay) attrs.push(`data-overlay="${overlay}"`);

    // Determine if we need special text color for bg image
    let inlineStyle = '';
    if (bgImage) {
      inlineStyle = ' style="--hero-text-color: white; --hero-text-muted: hsl(0 0% 100% / 0.8);"';
    }

    // Build HTML
    const isSplit = layout === 'split' || layout === 'split-reverse';
    let html = '';

    if (isSplit) {
      html = `<section class="hero" ${attrs.join(' ')}${inlineStyle}>
  <div class="hero__content" data-layout="stack" data-gap="md">
    <h1 class="hero__headline">${escapeHtml(headline)}</h1>
    <p class="hero__subheadline">${escapeHtml(subheadline)}</p>${showButtons ? `
    <div class="hero__actions">
      <button>Primary Action</button>
      <button data-variant="outline">Secondary</button>
    </div>` : ''}
  </div>
  <img class="hero__media" src="${getCurrentSplitImage()}" alt="Hero image" style="aspect-ratio: 4/3; border-radius: var(--radius-lg); object-fit: cover;">
</section>`;
    } else if (bgImage) {
      html = `<section class="hero" ${attrs.join(' ')}${inlineStyle}>
  <div class="hero__background">
    <img src="${getCurrentBgImage()}" alt="Background" style="width: 100%; height: 100%; object-fit: cover;">
  </div>
  <h1 class="hero__headline">${escapeHtml(headline)}</h1>
  <p class="hero__subheadline">${escapeHtml(subheadline)}</p>${showButtons ? `
  <div class="hero__actions">
    <button>Primary Action</button>
    <button data-variant="outline" style="border-color: white; color: white;">Secondary</button>
  </div>` : ''}
</section>`;
    } else {
      html = `<section class="hero" ${attrs.join(' ')}>
  <h1 class="hero__headline">${escapeHtml(headline)}</h1>
  <p class="hero__subheadline">${escapeHtml(subheadline)}</p>${showButtons ? `
  <div class="hero__actions">
    <button>Primary Action</button>
    <button data-variant="outline">Secondary</button>
  </div>` : ''}
</section>`;
    }

    // Update preview with View Transitions API if supported
    const container = document.getElementById('previewContainer');

    if (document.startViewTransition) {
      document.startViewTransition(() => {
        container.innerHTML = html;
      });
    } else {
      // Fallback for browsers without View Transitions
      container.innerHTML = html;
    }

    // Update code output
    document.getElementById('codeOutput').textContent = html;
  }

  // Escape HTML
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // Copy code
  function copyCode() {
    const code = document.getElementById('codeOutput').textContent;
    navigator.clipboard.writeText(code).then(() => {
      const btn = document.querySelector('.btn-copy');
      btn.textContent = 'Copied!';
      btn.setAttribute('data-copied', '');
      setTimeout(() => {
        btn.textContent = 'Copy Code';
        btn.removeAttribute('data-copied');
      }, 2000);
    });
  }

  // Presets
  function applyPreset(preset) {
    // Clear active state from all preset buttons
    document.querySelectorAll('.preset-btn').forEach(btn => btn.removeAttribute('data-active'));
    event.target.setAttribute('data-active', '');

    // Reset common values first
    document.getElementById('valign').value = '';
    document.getElementById('width').value = '';
    document.getElementById('bgImageChoice').value = '0';

    switch (preset) {
      case 'minimal':
        document.getElementById('layout').value = 'center';
        document.getElementById('theme').value = 'subtle';
        document.getElementById('size').value = '';
        document.getElementById('padding').value = 'xl';
        document.getElementById('bgImage').checked = false;
        document.getElementById('showButtons').checked = true;
        break;
      case 'bold':
        document.getElementById('layout').value = 'center';
        document.getElementById('theme').value = 'dark';
        document.getElementById('size').value = 'full';
        document.getElementById('padding').value = 'xl';
        document.getElementById('bgImage').checked = false;
        document.getElementById('showButtons').checked = true;
        break;
      case 'split':
        document.getElementById('layout').value = 'split';
        document.getElementById('theme').value = 'subtle';
        document.getElementById('size').value = 'auto';
        document.getElementById('padding').value = 'lg';
        document.getElementById('bgImage').checked = false;
        document.getElementById('showButtons').checked = true;
        break;
      case 'cinematic':
        document.getElementById('layout').value = 'center';
        document.getElementById('theme').value = 'dark';
        document.getElementById('size').value = 'full';
        document.getElementById('padding').value = 'xl';
        document.getElementById('valign').value = 'end';
        document.getElementById('bgImage').checked = true;
        document.getElementById('bgImageChoice').value = '1';
        document.getElementById('overlay').value = 'gradient';
        document.getElementById('showButtons').checked = false;
        break;
      case 'gradient':
        document.getElementById('layout').value = 'center';
        document.getElementById('theme').value = 'gradient';
        document.getElementById('size').value = '';
        document.getElementById('padding').value = 'xl';
        document.getElementById('bgImage').checked = false;
        document.getElementById('showButtons').checked = true;
        break;
      case 'landing':
        document.getElementById('layout').value = 'center';
        document.getElementById('theme').value = 'subtle';
        document.getElementById('size').value = 'full';
        document.getElementById('padding').value = 'xl';
        document.getElementById('width').value = 'narrow';
        document.getElementById('bgImage').checked = false;
        document.getElementById('showButtons').checked = true;
        document.getElementById('headline').value = 'Build Something Amazing';
        document.getElementById('subheadline').value = 'The modern way to create beautiful, responsive websites without the complexity.';
        break;
    }
    updatePreview();
  }

  // Initialize
  updatePreview();
</script>
