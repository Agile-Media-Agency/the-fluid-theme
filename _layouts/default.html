<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
  {% if page.extra_css %}
  <style>
    {{ page.extra_css }}
  </style>
  {% endif %}
  {% if page.extra_head %}
  {{ page.extra_head }}
  {% endif %}
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  {% include nav.html %}

  <main id="main-content">
    {{ content }}
  </main>

  {% include scripts.html %}
  {% if page.extra_scripts %}
  {{ page.extra_scripts }}
  {% endif %}
</body>
</html>
