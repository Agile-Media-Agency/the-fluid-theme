# Fluid Framework - Jekyll Configuration
# GitHub Pages builds this automatically - no local setup needed

title: Fluid Framework
description: A modern, semantic CSS design system
url: https://thefluidtheme.com
baseurl: ""

# Build settings
markdown: kramdown
highlighter: rouge
timezone: America/New_York

# Don't process these
exclude:
  - README.md
  - CLAUDE.md
  - AGENTS.md
  - GEMINI.md
  - package.json
  - package-lock.json
  - node_modules
  - _docs
  - fluid-agent-kit
  - scripts

# Include dotfiles if needed
include:
  - .nojekyll
  - _headers
  - _redirects

# Collections (if we add more pages later)
collections_dir: .

# Defaults - all pages use default layout unless specified
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default

# Site-wide variables
version: "0.4.3"
# Note: "Last Built" timestamp is now automatic via site.time
